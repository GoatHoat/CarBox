<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBox — Upgrades</title>
<style>html{background:#E9E9E9}</style>
<script>(function(){var t='system';try{t=(JSON.parse(localStorage.getItem('carbox.v1'))||{}).theme||'system'}catch(e){}if(t==='system')t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script defer src="state.js"></script>
<script defer src="ui.js"></script>
<script defer src="nav.js"></script>
<link rel="prefetch" href="index.html">
<link rel="prefetch" href="log.html">
<script type="speculationrules">
{"prerender":[{"urls":["index.html","log.html"]}]}
</script>
<style>

  .upghead{display:block}
  .upghead h1{font-size:38px;color:var(--tx,#141210);line-height:1}
  .upghead .sub{font-size:15px;font-weight:500;color:var(--warmgray);margin-top:2px}

  .goalrow{display:flex;gap:9px;margin-top:10px}
  .goalpill{
    display:flex;align-items:center;gap:10px;
    background:var(--accent,#796457);border-radius:999px;border:none;cursor:pointer;
    padding:8px 15px;box-shadow:var(--shadow);
  }
  .goalpill span{color:#FBF8F4;font-weight:600;font-size:14.5px;white-space:nowrap}
  .goalpill img{width:11px}
  .changegoal{
    background:transparent;border:2.5px solid #C2B6AA;border-radius:999px;cursor:pointer;
    padding:7px 16px;color:var(--mut,#8D8579);font-family:'League Spartan',sans-serif;font-weight:600;font-size:14.5px;
  }

  .stages{position:relative;margin-top:10px}
  .stages .rail{
    position:absolute;right:9px;top:30px;bottom:30px;width:3px;
    background:#6E5B4B;border-radius:2px;
  }
  .stage{position:relative;margin-right:26px;margin-bottom:8px}
  .stage .dot{
    position:absolute;right:-20px;top:50%;transform:translateY(-50%);
    width:9px;height:9px;border-radius:50%;background:#6E5B4B;
  }
  .scard{
    background:var(--surface,#F5F3F4);border-radius:16px;box-shadow:var(--shadow);
    padding:10px 13px;position:relative;
  }
  .schip{
    display:inline-block;border-radius:999px;padding:3px 11px;
    background:var(--accent,#7B6558);color:#FBF8F4;
    font-size:10.5px;font-weight:600;letter-spacing:.05em;
  }
  .scard .stitle{font-size:17px;font-weight:600;color:var(--tx,#17130F);margin-top:5px;line-height:1.1}
  .scard .smeta{font-size:13.5px;font-weight:600;color:var(--meta);margin-top:2px}
  .addplan{
    position:absolute;right:13px;bottom:11px;
    background:none;border:none;cursor:pointer;
    color:var(--accent-tx,#776357);font-family:'League Spartan',sans-serif;font-weight:600;font-size:13.5px;
    min-height:24px;
  }
  .addplan.inplan{color:var(--brown-warm)}

  .mapcard{
    background:var(--surface,#F5F3F4);border-radius:18px;box-shadow:var(--shadow);
    margin-top:10px;padding:12px 12px 11px;
  }
  .mapcard h2{font-size:17px;font-weight:600;color:var(--tx,#17130F);font-family:'League Spartan',sans-serif}
  .mapcard .msub{font-size:13px;font-weight:500;color:var(--warmgray);margin-top:1px}
  .mapimg{width:100%;border-radius:12px;margin-top:8px}
  .shoprow{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:8px}
  .shoprow .sname{font-size:15.5px;font-weight:600;color:var(--tx,#17130F);line-height:1.15}
  .shoprow .srate{font-size:12.5px;font-weight:600;color:var(--meta);margin-top:1px}
  .directions{
    background:transparent;border:2.5px solid #A79A8C;border-radius:999px;cursor:pointer;
    padding:6px 13px;color:var(--accent-tx,#776357);font-family:'League Spartan',sans-serif;font-weight:600;font-size:13.5px;
    flex:none;
  }
  .seeall{
    width:100%;margin-top:10px;
    background:var(--accent,#786557);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:9px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:14.5px;
    box-shadow:var(--shadow);
  }
</style>
</head>
<body>
<div class="phone">

  <div class="upghead">
    <div>
      <h1 class="serif">Upgrades</h1>
      <div class="sub">for your Bugatti Chiron</div>
    </div>
  </div>

  <div class="goalrow">
    <button class="goalpill">
      <span>Goal: More power</span>
      <img src="assets/icon_chevron.png" alt="">
    </button>
    <button class="changegoal">Change goal</button>
  </div>

  <div class="stages">
    <div class="rail"></div>

    <div class="stage">
      <span class="dot"></span>
      <div class="scard">
        <span class="schip">STAGE 1</span>
        <div class="stitle">ECU tune</div>
        <div class="smeta">+120 hp &middot; ~$4,500</div>
        <button class="addplan">Add to plan</button>
      </div>
    </div>

    <div class="stage">
      <span class="dot"></span>
      <div class="scard">
        <span class="schip">STAGE 2</span>
        <div class="stitle">Downpipes + intercooler</div>
        <div class="smeta">+90 hp &middot; ~$8,200</div>
        <button class="addplan">Add to plan</button>
      </div>
    </div>
  </div>

  <div class="mapcard">
    <h2>Where to get it done</h2>
    <div class="msub">ECU tune &middot; 4 shops near you</div>
    <div class="mapwrap">
      <img class="mapimg" src="assets/map_shops.png" alt="Map of nearby shops">
      <span class="pinpulse" style="left:47%;top:42%" aria-hidden="true"></span>
    </div>
    <div class="shoprow">
      <div>
        <div class="sname">Apex Performance Tuning</div>
        <div class="srate">4.8 &#9733; &middot; 2.1 mi &middot; from $3,900</div>
      </div>
      <button class="directions">Directions</button>
    </div>
    <button class="seeall">See all 4 shops</button>
  </div>

  <nav class="nav" data-active="2">
    <span class="navpill" aria-hidden="true"></span>
    <a class="tab" href="index.html"><img class="i-navtire" src="assets/nav_tire_v2.png" alt=""><span class="lbl">Garage</span></a>
    <a class="tab" href="log.html"><img class="i-navwrench" src="assets/nav_wrench.png" alt=""><span class="lbl">log</span></a>
    <a class="tab active" href="upgrades.html"><img class="i-navgear" src="assets/nav_up.png" alt=""><span class="lbl">upgrades</span></a>
  </nav>

</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  function goGoal() { location.href = 'goal-picker.html'; }
  document.querySelector('.goalpill').addEventListener('click', goGoal);
  document.querySelector('.changegoal').addEventListener('click', goGoal);

  /* goal pill + subtitle reflect state */
  document.querySelector('.goalpill span').textContent = 'Goal: ' + CarBox.get('goal');
  document.querySelector('.upghead .sub').textContent = 'for your ' + CarBox.get('vehicle').name;

  /* ── stages: add-to-plan toggles + running total pill ── */
  var STAGES = [{ id: 's1', cost: 4500 }, { id: 's2', cost: 8200 }];
  var plan = CarBox.get('planItems');
  var btns = Array.prototype.slice.call(document.querySelectorAll('.addplan'));
  var totalPill = document.createElement('div');
  totalPill.className = 'plantotal';
  document.querySelector('.stages').insertAdjacentElement('afterend', totalPill);
  var shownTotal = 0;

  function planTotal() {
    var t = 0;
    STAGES.forEach(function (s) { if (plan.indexOf(s.id) !== -1) t += s.cost; });
    return t;
  }
  function paintPlan(animate) {
    btns.forEach(function (btn, i) {
      var inPlan = plan.indexOf(STAGES[i].id) !== -1;
      btn.textContent = inPlan ? 'In plan ✓' : 'Add to plan';
      btn.classList.toggle('inplan', inPlan);
    });
    var t = planTotal();
    if (t > 0) {
      totalPill.classList.add('show');
      if (animate) {
        UI.countUp(totalPill, shownTotal, t, function (n) { return 'Plan total: ~' + CarBox.fmtMoney(n); });
      } else {
        totalPill.textContent = 'Plan total: ~' + CarBox.fmtMoney(t);
      }
    } else {
      totalPill.classList.remove('show');
    }
    shownTotal = t;
  }
  paintPlan(false);
  btns.forEach(function (btn, i) {
    btn.addEventListener('click', function () {
      var id = STAGES[i].id;
      var idx = plan.indexOf(id);
      if (idx === -1) plan.push(id); else plan.splice(idx, 1);
      CarBox.set('planItems', plan);
      btn.classList.remove('pop');
      void btn.offsetWidth;
      btn.classList.add('pop');
      paintPlan(true);
    });
  });

  /* ── shops ── */
  var SHOPS = [
    { name: 'Apex Performance Tuning', rate: 4.8, dist: 2.1, from: 3900 },
    { name: 'Redline Dyno Works', rate: 4.7, dist: 3.4, from: 4200 },
    { name: 'Precision Motorsport Lab', rate: 4.9, dist: 5.0, from: 4800 },
    { name: 'Velocity Garage', rate: 4.6, dist: 6.2, from: 3650 }
  ];
  function fmtDist(mi) {
    return CarBox.get('units') === 'km'
      ? (mi * 1.60934).toFixed(1) + ' km'
      : mi + ' mi';
  }
  function shopMeta(s) { return s.rate + ' ★ · ' + fmtDist(s.dist) + ' · from ' + CarBox.fmtMoney(s.from); }
  function dirToast() { UI.toast('Opens in Maps at launch'); }

  document.querySelector('.shoprow .srate').textContent = shopMeta(SHOPS[0]);
  document.querySelector('.shoprow .directions').addEventListener('click', dirToast);

  document.querySelector('.seeall').addEventListener('click', function () {
    UI.sheet({
      title: 'Shops near you',
      label: 'Shops near you',
      build: function (body) {
        SHOPS.forEach(function (s) {
          var row = document.createElement('div');
          row.className = 'sheetrow rowflex';
          var left = document.createElement('div');
          var nm = document.createElement('div'); nm.className = 'rowtop'; nm.textContent = s.name;
          var mt = document.createElement('div'); mt.className = 'rowtx'; mt.textContent = shopMeta(s);
          left.appendChild(nm); left.appendChild(mt);
          var btn = document.createElement('button');
          btn.className = 'directions';
          btn.textContent = 'Directions';
          btn.setAttribute('aria-label', 'Directions to ' + s.name);
          btn.addEventListener('click', dirToast);
          row.appendChild(left); row.appendChild(btn);
          body.appendChild(row);
        });
      }
    });
  });
});
</script>
</body>
</html>
