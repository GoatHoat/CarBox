<script>(function(){try{if(!(JSON.parse(localStorage.getItem('carbox.v1'))||{}).onboardingComplete){location.replace('onboarding.html');return}}catch(e){location.replace('onboarding.html');return}var t='system';try{t=(JSON.parse(localStorage.getItem('carbox.v1'))||{}).theme||'system'}catch(e){}if(t==='system')t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);try{var d=sessionStorage.getItem('carbox.navdir');if(d){document.documentElement.setAttribute('data-navdir',d);sessionStorage.removeItem('carbox.navdir')}}catch(e){}})();</script>

<style>

  .upghead{display:block}
  .upghead h1{font-size:38px;color:var(--tx,#141210);line-height:1}
  .upghead .sub{font-size:15px;font-weight:500;color:var(--warmgray);margin-top:2px}

  .goalrow{display:flex;gap:9px;margin-top:10px}
  /* goal label — NOT a button: plain chip, no press/hover, no chevron */
  .goalpill{
    display:flex;align-items:center;
    background:var(--accent,#796457);border-radius:999px;
    padding:8px 15px;box-shadow:var(--shadow);cursor:default;
  }
  .goalpill span{color:#FBF8F4;font-weight:600;font-size:14.5px;white-space:nowrap}
  .changegoal{
    background:transparent;border:2.5px solid #C2B6AA;border-radius:999px;cursor:pointer;
    padding:7px 16px;color:var(--mut,#8D8579);font-family:'League Spartan',sans-serif;font-weight:600;font-size:14.5px;
  }

  .stages{position:relative;margin-top:10px}
  .stages .rail{
    position:absolute;right:9px;top:30px;bottom:30px;width:3px;
    background:#6E5B4B;border-radius:2px;
  }
  .stage{position:relative;margin-right:26px;margin-bottom:8px}
  .stage .dot{
    position:absolute;right:-20px;top:50%;transform:translateY(-50%);
    width:9px;height:9px;border-radius:50%;background:#6E5B4B;
  }
  .scard{
    background:var(--surface,#F5F3F4);border-radius:16px;box-shadow:var(--shadow);
    padding:10px 13px;position:relative;cursor:pointer;
  }
  .scard.mapped{box-shadow:var(--shadow),inset 0 0 0 2.5px #6E5A46}
  .schip{
    display:inline-block;border-radius:999px;padding:3px 11px;
    background:var(--accent,#7B6558);color:#FBF8F4;
    font-size:10.5px;font-weight:600;letter-spacing:.05em;
  }
  .scard .stitle{font-size:17px;font-weight:600;color:var(--tx,#17130F);margin-top:5px;line-height:1.1;padding-right:70px}
  .scard .smeta{font-size:13.5px;font-weight:600;color:var(--meta);margin-top:2px;padding-right:70px}
  .addmap{
    position:absolute;right:13px;bottom:11px;
    background:none;border:none;cursor:pointer;
    color:var(--accent-tx,#776357);font-family:'League Spartan',sans-serif;font-weight:600;font-size:13.5px;
    min-height:24px;
  }
  .addmap.onmap{color:var(--brown-warm)}

  /* loading skeleton — same card bones, gently pulsing */
  .skelline{height:12px;border-radius:6px;background:var(--ctl,#E3DED9);margin-top:8px}
  .skelline.w40{width:40%}.skelline.w70{width:70%}.skelline.w55{width:55%}
  .scard.skel{cursor:default;min-height:64px}
  @keyframes skelpulse{0%,100%{opacity:.55}50%{opacity:1}}
  .skelline{animation:skelpulse 1.3s ease-in-out infinite}

  .mapcard{
    background:var(--surface,#F5F3F4);border-radius:18px;box-shadow:var(--shadow);
    margin-top:10px;padding:12px 12px 11px;
  }
  .mapcard h2{font-size:17px;font-weight:600;color:var(--tx,#17130F);font-family:'League Spartan',sans-serif}
  .mapcard .msub{font-size:13px;font-weight:500;color:var(--warmgray);margin-top:1px}
  .mapimg{width:100%;border-radius:12px;margin-top:8px}
  .shoprow{display:flex;align-items:center;justify-content:space-between;margin-top:9px;gap:8px}
  .shoprow .sname{font-size:15.5px;font-weight:600;color:var(--tx,#17130F);line-height:1.15}
  .shoprow .srate{font-size:12.5px;font-weight:600;color:var(--meta);margin-top:1px}
  .directions{
    background:transparent;border:2.5px solid #A79A8C;border-radius:999px;cursor:pointer;
    padding:6px 13px;color:var(--accent-tx,#776357);font-family:'League Spartan',sans-serif;font-weight:600;font-size:13.5px;
    flex:none;
  }
  .seeall{
    width:100%;margin-top:10px;
    background:var(--accent,#786557);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:9px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:14.5px;
    box-shadow:var(--shadow);
  }

  /* location-locked map state: opaque brown block, lock, explanation */
  .maplock{
    background:var(--brown-warm);border-radius:12px;margin-top:8px;
    min-height:170px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;padding:18px 22px;text-align:center;
  }
  .maplock img{width:34px}
  .maplock .lktx{color:#FBF8F4;font-size:14px;font-weight:600;line-height:1.35}
  .maplock .lkbtn{
    margin-top:4px;background:#FBF8F4;color:var(--brown-warm);border:none;border-radius:999px;cursor:pointer;
    padding:9px 20px;font-family:'League Spartan',sans-serif;font-weight:700;font-size:14px;
  }

  /* error / empty message inside the map card */
  .mapmsg{
    margin-top:10px;padding:14px 6px 6px;text-align:center;
    font-size:13.5px;font-weight:600;color:var(--mut,#8D8D8B);line-height:1.4;
  }
  .mapmsg .retry{
    display:block;margin:10px auto 4px;
    background:transparent;border:2.5px solid #A79A8C;border-radius:999px;cursor:pointer;
    padding:6px 16px;color:var(--accent-tx,#776357);font-family:'League Spartan',sans-serif;font-weight:600;font-size:13.5px;
  }
  .shopskel{margin-top:12px}

  @media (prefers-reduced-motion: reduce){
    .skelline{animation:none;opacity:.7}
  }
</style>
</head>
<body>
<div class="phone">

  <div class="upghead">
    <div>
      <h1 class="serif">Upgrades</h1>
      <div class="sub">for your car</div>
    </div>
  </div>

  <div class="goalrow">
    <div class="goalpill"><span>Goal: More power</span></div>
    <button class="changegoal">Change goal</button>
  </div>

  <!-- AI recommendations render here (skeleton first, then 2 cards) -->
  <div class="stages" id="recs">
    <div class="rail"></div>
  </div>

  <div class="mapcard">
    <h2>Where to get it done</h2>
    <div class="msub" id="mapsub"></div>
    <div id="mapzone"></div>
  </div>

  <nav class="nav" data-active="2">
    <span class="navpill" aria-hidden="true"></span>
    <a class="tab" href="index.html"><img class="i-navtire" src="assets/nav_tire_v2.png" alt=""><span class="lbl">Garage</span></a>
    <a class="tab" href="log.html"><img class="i-navwrench" src="assets/nav_wrench.png" alt=""><span class="lbl">log</span></a>
    <a class="tab active" href="upgrades.html"><img class="i-navgear" src="assets/nav_up.png" alt=""><span class="lbl">upgrades</span></a>
  </nav>

</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var $ = function (id) { return document.getElementById(id); };

  /* ── API proxy base (keys live server-side, see /server/README.md).
     Default: same host as the page on port 8787 (the local proxy). Override
     once with localStorage.setItem('carbox.apiBase','https://your-deploy'). ── */
  var API_BASE = (function () {
    try { var s = localStorage.getItem('carbox.apiBase'); if (s) return s.replace(/\/+$/, ''); } catch (e) {}
    if (location.protocol === 'http:' || location.protocol === 'https:')
      return location.protocol + '//' + location.hostname + ':8787';
    return 'http://localhost:8787';
  })();
  function api(path, payload, timeoutMs) {
    var ctl = ('AbortController' in window) ? new AbortController() : null;
    var timer = ctl && setTimeout(function () { ctl.abort(); }, timeoutMs || 12000);
    return fetch(API_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: ctl ? ctl.signal : undefined
    }).then(function (r) {
      if (timer) clearTimeout(timer);
      if (!r.ok) throw new Error('http ' + r.status);
      return r.json();
    }, function (e) { if (timer) clearTimeout(timer); throw e; });
  }
  /* the no-dashes rule is enforced in the AI system prompt AND here as a backstop */
  function clean(s) { return String(s || '').replace(/\s*[—–]\s*/g, ', '); }

  var vehicle = CarBox.get('vehicle');
  var goal = CarBox.get('goal');
  document.querySelector('.goalpill span').textContent = 'Goal: ' + goal;
  document.querySelector('.upghead .sub').textContent = 'for your ' + vehicle.name;
  /* "Change goal" is the ONLY way into the goal picker (the pill is a label) */
  document.querySelector('.changegoal').addEventListener('click', function () {
    location.href = 'goal-picker.html';
  });

  /* ════════ AI RECOMMENDATIONS (Part B) ════════ */
  var recsWrap = $('recs');
  var recsKey = [vehicle.make, vehicle.model, vehicle.year, vehicle.trim || '', goal].join('|');
  var items = [];   /* [{name, benefit, detail}] */

  function card(html) {
    var stage = document.createElement('div');
    stage.className = 'stage';
    stage.innerHTML = '<span class="dot"></span>' + html;
    return stage;
  }
  function renderSkeleton() {
    recsWrap.querySelectorAll('.stage').forEach(function (el) { el.remove(); });
    for (var i = 0; i < 2; i++) {
      recsWrap.appendChild(card(
        '<div class="scard skel" aria-hidden="true">' +
        '<div class="skelline w40"></div><div class="skelline w70"></div><div class="skelline w55"></div></div>'
      ));
    }
  }

  var CHECK_SVG = '<svg viewBox="0 0 24 24" width="12" height="12" aria-hidden="true" ' +
    'style="display:inline-block;vertical-align:-1px"><path d="M4 12.5 L10 18.5 L20 6.5" fill="none" ' +
    'stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  function mappedName() {
    var m = CarBox.get('mappedMod');
    for (var i = 0; i < items.length; i++) if (items[i].name === m) return m;
    return items.length ? items[0].name : null;
  }
  function paintMapped() {
    var m = mappedName();
    recsWrap.querySelectorAll('.scard').forEach(function (el) {
      var isOn = el.getAttribute('data-name') === m;
      el.classList.toggle('mapped', isOn);
      var btn = el.querySelector('.addmap');
      if (btn) {
        btn.classList.toggle('onmap', isOn);
        btn.innerHTML = isOn ? 'On map ' + CHECK_SVG : 'Add to map';
      }
    });
  }

  function openDetail(mod) {
    UI.sheet({
      title: mod.name,
      label: mod.name,
      build: function (body) {
        var meta = document.createElement('div');
        meta.className = 'sheetrow';
        meta.innerHTML = '<div class="rowtop">Estimated</div>';
        var mtx = document.createElement('div');
        mtx.className = 'rowtx';
        mtx.textContent = clean(mod.benefit);
        meta.appendChild(mtx);
        body.appendChild(meta);
        var row = document.createElement('div');
        row.className = 'sheetrow';
        var tx = document.createElement('div');
        tx.className = 'rowtx';
        tx.textContent = clean(mod.detail);   /* paragraph: what it is, what it does, why this car */
        row.appendChild(tx);
        body.appendChild(row);
      }
    });
  }

  function renderRecs() {
    recsWrap.querySelectorAll('.stage').forEach(function (el) { el.remove(); });
    items.forEach(function (mod) {
      var stage = card(
        '<div class="scard" data-name="' + mod.name.replace(/"/g, '&quot;') + '" role="button" tabindex="0" data-press>' +
        '<span class="schip">RECOMMENDED</span>' +
        '<div class="stitle"></div>' +
        '<div class="smeta"></div>' +
        '<button class="addmap">Add to map</button></div>'
      );
      stage.querySelector('.stitle').textContent = mod.name;
      stage.querySelector('.smeta').textContent = clean(mod.benefit);
      var sc = stage.querySelector('.scard');
      sc.addEventListener('click', function (e) {
        if (e.target.closest('.addmap')) return;
        openDetail(mod);
      });
      sc.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') openDetail(mod);
      });
      stage.querySelector('.addmap').addEventListener('click', function () {
        CarBox.set('mappedMod', mod.name);
        var b = this;
        b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');
        paintMapped();
        loadShops();   /* swap the map section to this mod's shops */
      });
      recsWrap.appendChild(stage);
    });
    if (!CarBox.get('mappedMod') || mappedName() !== CarBox.get('mappedMod')) {
      CarBox.set('mappedMod', mappedName());
    }
    paintMapped();
  }

  /* ── LOCAL FALLBACK recommender ──
     Used ONLY when the API proxy is unreachable or has no key yet, so the
     page never shows a broken/empty state. Rules-based: goal + aspiration
     (turbo/supercharged/NA/EV) + drivetrain pick 2 safe, generic mods.
     Detail strings deliberately contain no em or en dashes. */
  function localRecs() {
    var s = vehicle.specs || {};
    var eng = String(s.engine || '').toLowerCase();
    var ev = /electric/.test(eng);
    var boosted = /turbo|supercharg/.test(eng);
    var carTag = vehicle.year + ' ' + vehicle.make + ' ' + vehicle.model;
    function R(name, benefit, detail) { return { name: name, benefit: benefit, detail: detail }; }
    if (goal === 'Better handling') {
      return [
        R('Coilover suspension kit', 'Sharper turn-in and adjustable ride height, roughly $1,200-2,200',
          'A coilover kit replaces the factory springs and shocks with height and damping adjustable units. It lowers the center of gravity, reduces body roll, and lets you fine tune how firm the car feels. For a ' + carTag + ' chasing better handling, it is the single biggest step because every corner input gets more precise while stock comfort stays available at softer settings.'),
        R('Performance summer tires', 'The biggest grip gain per dollar, roughly $600-1,100 a set',
          'Tires are the only part of the car touching the road, so a set of modern performance summer tires transforms grip, braking distance, and steering feel at once. They are safe, reversible, and work with all stock components. On a ' + carTag + ' this is the first upgrade any handling focused build should make before touching anything else.')
      ];
    }
    if (goal === 'Show car looks') {
      return [
        R('Aftermarket wheel setup', 'A complete stance change, roughly $1,400-2,600 with tires',
          'A well chosen set of aftermarket wheels in the right width and offset changes the whole character of the car more than any other visual mod. It keeps everything bolt-on and reversible. For a ' + carTag + ' it is the highest impact way to make the car look finished and intentional at a show or on the street.'),
        R('Paint correction and ceramic coating', 'Deep gloss that lasts years, roughly $600-1,200',
          'Paint correction machine polishes the clear coat to remove swirls and haze, then a ceramic coating seals that finish so it beads water and resists grime. The car looks wet and freshly detailed all the time. On a ' + carTag + ' built to be seen, flawless paint is the base layer every other cosmetic mod sits on.')
      ];
    }
    if (goal === 'Track ready') {
      return [
        R('Track brake pads and fluid', 'Fade-free braking all session, roughly $400-800',
          'High temperature brake pads and racing brake fluid keep the pedal firm lap after lap where stock parts overheat and fade. It is the first safety critical upgrade for any track day. A ' + carTag + ' will stop harder and more consistently, which is worth more lap time than adding power and keeps you safe when everything else gets hot.'),
        R('200TW track tires', 'Seconds off your lap time, roughly $800-1,400 a set',
          'A 200 treadwear tire is street legal but built for circuit grip, with stiffer sidewalls and a compound that comes alive with heat. It is the fastest single change you can make to lap times. For a ' + carTag + ' heading to the track, grip from the tires makes the power, brakes, and suspension all work better together.')
      ];
    }
    /* More power (default) */
    if (ev) {
      return [
        R('Lightweight flow-formed wheels', 'Quicker acceleration feel, roughly $1,200-2,000',
          'An electric motor already delivers instant torque, so shedding rotating mass is the cleanest way to make the car feel faster. Lighter wheels reduce the energy needed to spin up, improving both acceleration response and range slightly. On a ' + carTag + ' this keeps the powertrain untouched (and the warranty intact) while making every launch feel sharper.'),
        R('High-grip summer tires', 'Puts the torque to the ground, roughly $700-1,200 a set',
          'Electric cars often overpower their factory efficiency tires. A performance summer tire converts the instant torque into real forward motion instead of wheelspin and shortens braking distances too. For a ' + carTag + ' it is the safest and most effective way to use the power it already has.')
      ];
    }
    if (boosted) {
      return [
        R('ECU flash tune', 'Meaningful gains on a boosted engine, roughly $500-900',
          'A flash tune rewrites the factory engine calibration to raise boost and optimize fuel and timing within safe limits. Because the ' + carTag + ' is already running forced induction, the hardware headroom is there and a reputable tune unlocks it. It is the best power per dollar available for this platform when done by an experienced shop on a dyno.'),
        R('Cat-back exhaust system', 'Freer flow and real sound, roughly $800-1,500',
          'A cat-back exhaust replaces the restrictive rear section of the factory system with larger, smoother piping. It releases a modest amount of power, sheds weight, and gives the car a genuine performance voice. Paired with a tune on a boosted ' + carTag + ' it helps the whole system breathe and sets up any future hardware upgrades.')
      ];
    }
    return [
      R('Cold air intake', 'Better breathing and response, roughly $300-450',
        'A cold air intake replaces the factory airbox with a freer flowing filter that draws cooler, denser air. On a naturally aspirated engine the gains are honest but modest, and throttle response and sound both improve immediately. For a ' + carTag + ' it is the right first step because it is affordable, reversible, and works with the stock computer safely.'),
      R('Cat-back exhaust system', 'Flow, sound, and less weight, roughly $700-1,400',
        'A cat-back exhaust swaps the muffler and rear piping for a straighter, larger diameter path. It frees a few horsepower, cuts weight, and gives the car a cleaner exhaust note without drone when sized correctly. Combined with an intake it lets a naturally aspirated ' + carTag + ' breathe at both ends, which is the sensible power recipe without touching internals.')
    ];
  }

  function initRecs() {
    var cached = CarBox.get('recs');
    if (cached && cached.key === recsKey && cached.source === 'api' && cached.items && cached.items.length === 2) {
      items = cached.items;      /* fresh cache for this exact car+goal: no re-call */
      renderRecs();
      return;
    }
    if (cached && cached.key === recsKey && cached.items && cached.items.length === 2) {
      items = cached.items;      /* fallback cache: show instantly, still retry the API */
      renderRecs();
    } else {
      renderSkeleton();
    }
    api('/api/recommend', {
      make: vehicle.make, model: vehicle.model, year: vehicle.year,
      trim: vehicle.trim || '', specs: vehicle.specs || {}, goal: goal
    }, 20000).then(function (data) {
      if (data && data.recommendations && data.recommendations.length === 2) {
        items = data.recommendations.map(function (m) {
          return { name: m.name, benefit: clean(m.benefit), detail: clean(m.detail) };
        });
        CarBox.set('recs', { key: recsKey, items: items, source: 'api' });
        renderRecs();
        loadShops();
      } else { throw new Error('bad payload'); }
    }).catch(function () {
      /* FALLBACK: proxy down or key missing — never show a broken state */
      if (!items.length) {
        items = localRecs();
        CarBox.set('recs', { key: recsKey, items: items, source: 'local' });
        renderRecs();
        loadShops();
      }
    });
  }

  /* ════════ WHERE TO GET IT DONE (Parts C + D) ════════ */
  var mapzone = $('mapzone'), mapsub = $('mapsub');
  var shops = [];

  function fmtDist(mi) {
    return CarBox.get('units') === 'km'
      ? (mi * 1.60934).toFixed(1) + ' km'
      : mi + ' mi';
  }
  function shopMeta(s) {
    return s.rating + ' ★ (' + (s.ratingCount || 0) + ') · ' + fmtDist(s.distanceMiles) + ' · ' + s.priceEstimate;
  }
  /* real directions: deep link into the maps app (Google Maps universal URL) */
  function openDirections(s) {
    var url = s.mapsUrl || ('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(s.name));
    var w = null;
    try { w = window.open(url, '_blank'); } catch (e) {}
    if (!w) location.href = url;
  }

  function setSub(txt) { mapsub.textContent = txt; }
  function zone(html) { mapzone.innerHTML = html; }

  function renderLocked() {
    var m = mappedName();
    setSub(m ? m : 'Nearby shops');
    zone('<div class="maplock">' +
      '<img src="assets/badge_lock.png" alt="">' +
      '<div class="lktx">Allow location access to see real shops near you that can do this mod, with live ratings, distances, and price estimates.</div>' +
      '<button class="lkbtn" id="lockAllow">Allow location</button></div>');
    $('lockAllow').addEventListener('click', function () {
      if (!navigator.geolocation) { UI.toast('Location isn’t available on this device'); return; }
      var b = this; b.disabled = true; b.textContent = 'Requesting…';
      navigator.geolocation.getCurrentPosition(function (pos) {
        CarBox.set('locationGranted', true);
        CarBox.set('location', { lat: pos.coords.latitude, lng: pos.coords.longitude });
        loadShops();
      }, function () {
        b.disabled = false; b.textContent = 'Allow location';
        UI.toast('Location was denied — check your device settings');
      }, { enableHighAccuracy: false, timeout: 12000, maximumAge: 300000 });
    });
  }

  function renderLoading() {
    var m = mappedName();
    setSub(m ? m + ' · finding shops near you…' : 'Finding shops…');
    zone('<div class="mapwrap"><img class="mapimg" src="assets/map_shops.png" alt="Map of nearby shops"></div>' +
      '<div class="shopskel"><div class="skelline w70"></div><div class="skelline w55"></div>' +
      '<div class="skelline w70"></div><div class="skelline w40"></div></div>');
  }

  function renderError() {
    var m = mappedName();
    setSub(m || 'Nearby shops');
    zone('<div class="mapmsg">Couldn’t reach the shop service. Check that the CarBox API proxy is running, then try again.' +
      '<button class="retry" id="shopRetry">Try again</button></div>');
    $('shopRetry').addEventListener('click', loadShops);
  }

  function renderEmpty() {
    var m = mappedName();
    setSub(m || 'Nearby shops');
    zone('<div class="mapmsg">No shops for this mod found near you yet. Try again later or widen your search from a bigger city.</div>');
  }

  function renderShops() {
    var m = mappedName();
    setSub(m + ' · ' + shops.length + ' shop' + (shops.length === 1 ? '' : 's') + ' near you');
    var html = '<div class="mapwrap"><img class="mapimg" src="assets/map_shops.png" alt="Map of nearby shops">' +
      '<span class="pinpulse" style="left:47%;top:42%" aria-hidden="true"></span></div>';
    zone(html);
    var first = shops[0];
    var row = document.createElement('div');
    row.className = 'shoprow';
    row.innerHTML = '<div><div class="sname"></div><div class="srate"></div></div>' +
      '<button class="directions">Directions</button>';
    row.querySelector('.sname').textContent = first.name;
    row.querySelector('.srate').textContent = shopMeta(first);
    row.querySelector('.directions').addEventListener('click', function () { openDirections(first); });
    mapzone.appendChild(row);
    if (shops.length > 1) {
      var btn = document.createElement('button');
      btn.className = 'seeall';
      btn.textContent = 'See all ' + shops.length + ' shops';
      btn.addEventListener('click', seeAllSheet);
      mapzone.appendChild(btn);
    }
    var pin = mapzone.querySelector('.pinpulse');
    if (pin && !UI.reduced()) pin.classList.add('pindrop');
  }

  function seeAllSheet() {
    UI.sheet({
      title: 'Shops near you',
      label: 'Shops near you',
      build: function (body) {
        shops.forEach(function (s) {
          var row = document.createElement('div');
          row.className = 'sheetrow rowflex';
          var left = document.createElement('div');
          var nm = document.createElement('div'); nm.className = 'rowtop'; nm.textContent = s.name;
          var mt = document.createElement('div'); mt.className = 'rowtx'; mt.textContent = shopMeta(s);
          left.appendChild(nm); left.appendChild(mt);
          var btn = document.createElement('button');
          btn.className = 'directions';
          btn.textContent = 'Directions';
          btn.setAttribute('aria-label', 'Directions to ' + s.name);
          btn.addEventListener('click', function () { openDirections(s); });
          row.appendChild(left); row.appendChild(btn);
          body.appendChild(row);
        });
        var note = document.createElement('div');
        note.className = 'sheet-note';
        note.textContent = 'Ratings live from Google · prices are estimates';
        body.appendChild(note);
      }
    });
  }

  /* live call every time — ratings/distances must be current, so no caching */
  function loadShops() {
    var m = mappedName();
    if (!m) { setSub(''); zone(''); return; }
    if (!CarBox.get('locationGranted') || !CarBox.get('location')) { renderLocked(); return; }
    renderLoading();
    var loc = CarBox.get('location');
    api('/api/shops', { lat: loc.lat, lng: loc.lng, modName: m }, 15000)
      .then(function (data) {
        shops = (data && data.shops) || [];
        if (!shops.length) renderEmpty(); else renderShops();
      })
      .catch(renderError);
  }

  /* ── boot ── */
  initRecs();
  loadShops();
  UI.condense('Upgrades');
});
</script>
</body>
</html>
