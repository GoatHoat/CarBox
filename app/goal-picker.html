<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBox — Pick a goal</title>
<style>html{background:#E9E9E9}</style>
<script>(function(){var t='system';try{t=(JSON.parse(localStorage.getItem('carbox.v1'))||{}).theme||'system'}catch(e){}if(t==='system')t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);try{var d=sessionStorage.getItem('carbox.navdir');if(d){document.documentElement.setAttribute('data-navdir',d);sessionStorage.removeItem('carbox.navdir')}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script defer src="state.js"></script>
<script defer src="ui.js"></script>
<script defer src="pro.js"></script>
<link rel="prefetch" href="upgrades.html">
<style>

  .phone{padding-bottom:190px}
  .goalhead{text-align:center;margin-top:26px}
  .goalhead h1{font-size:36px;color:var(--tx,#141210);line-height:1}
  .goalhead .sub{font-size:15px;font-weight:500;color:var(--warmgray);margin-top:5px}

  .goalgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}
  .goalcard{
    position:relative;
    background:var(--card);border-radius:26px;box-shadow:var(--shadow);
    border:none;cursor:pointer;padding:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    aspect-ratio:1/1.02;
    box-shadow:var(--shadow),inset 0 0 0 0 rgba(110,90,70,0);
    transition:box-shadow .28s cubic-bezier(.3,1.4,.4,1),transform 90ms ease-out;
  }
  .goalcard.sel{box-shadow:var(--shadow),inset 0 0 0 3.5px #6E5A46}
  .goalcard .glabel{
    font-family:'League Spartan',sans-serif;font-size:16.5px;font-weight:600;color:var(--tx,#141210);
  }
  .g-cash{width:64px}.g-tire{width:70px}.g-star{width:66px}.g-watch{width:64px}
  .goalcard .lock{
    position:absolute;top:11px;right:12px;width:15px;
  }

  .goalfoot{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:375px;z-index:20;
    background:var(--bg-bottom);
    box-shadow:0 -8px 22px rgba(0,0,0,.05);
    padding:14px 18px calc(20px + env(safe-area-inset-bottom, 0px));
  }
  .prorow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .prorow .protx{font-size:15px;font-weight:500;color:var(--mut,#8D8D8B);line-height:1.3}
  .prorow .probadge{background:none;border:none;cursor:pointer;padding:0;flex:none}
  .prorow .probadge img{width:51px}
  .continue{
    width:100%;margin-top:13px;
    background:var(--brown-warm);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:14px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:19px;
    box-shadow:var(--shadow);
  }
  /* one-time-goal confirm popup buttons */
  .gsheetbtn{
    width:100%;margin-top:12px;
    background:var(--brown-warm);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:12px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:16px;box-shadow:var(--shadow);
  }
  .gsheetbtn.ghost{background:transparent;color:var(--tx,#141210);box-shadow:none;margin-top:4px}
</style>
</head>
<body>
<div class="phone">

  <div class="goalhead">
    <h1 class="serif">Pick a goal</h1>
    <div class="sub">for your Bugatti Chiron</div>
  </div>

  <div class="goalgrid">
    <button class="goalcard" data-goal="More power">
      <img class="g-cash" src="assets/goal_cash.png" alt="">
      <span class="glabel">More power</span>
    </button>
    <button class="goalcard" data-goal="Better handling">
      <img class="g-tire" src="assets/goal_tire.png" alt="">
      <span class="glabel">Better handling</span>
    </button>
    <button class="goalcard" data-goal="Show car looks">
      <img class="g-star" src="assets/goal_star.png" alt="">
      <span class="glabel">Show car looks</span>
    </button>
    <button class="goalcard" data-goal="Track ready">
      <img class="g-watch" src="assets/goal_watch.png" alt="">
      <span class="glabel">Track ready</span>
    </button>
  </div>

  <div class="goalfoot">
    <div class="prorow">
      <div class="protx">Pick one goal for free.<br>Change it anytime with Pro</div>
      <button class="probadge" aria-label="CarBox Pro"><img src="assets/badge_pro.png" alt=""></button>
    </div>
    <button class="continue" id="continue">Continue</button>
  </div>

</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelector('.goalhead .sub').textContent = 'for your ' + CarBox.get('vehicle').name;
  var selected = CarBox.get('goal');
  var cards = document.querySelectorAll('.goalcard');

  function refresh() {
    cards.forEach(function (card) {
      card.classList.toggle('sel', card.getAttribute('data-goal') === selected);
    });
  }
  refresh();

  /* every goal is selectable now; the free plan just limits you to ONE choice. */
  cards.forEach(function (card) {
    card.addEventListener('click', function () {
      selected = card.getAttribute('data-goal');
      refresh();
    });
  });

  function proText() {
    if (CarBox.get('isPro')) document.querySelector('.protx').innerHTML = 'CarBox Pro: change your goal anytime.';
  }
  proText();
  document.addEventListener('carbox-pro', proText);

  document.querySelector('.probadge').addEventListener('click', function () {
    if (CarBox.get('isPro')) UI.toast('You’re on CarBox Pro');
    else Pro.open();
  });

  /* one-time-choice confirm popup (free users, first goal pick) */
  function confirmGoalOnce(goal, onProceed) {
    var sh = UI.sheet({
      title: 'Lock in ' + goal + '?',
      label: 'Confirm goal',
      build: function (body) {
        var p = document.createElement('div');
        p.className = 'sheet-note'; p.style.marginTop = '0';
        p.textContent = 'On the free plan you can pick one goal, and this will be it. ' +
          'To choose a different goal later you will need CarBox Pro. Continue with ' + goal + '?';
        body.appendChild(p);
        var go = document.createElement('button');
        go.className = 'gsheetbtn'; go.textContent = 'Continue with ' + goal;
        go.addEventListener('click', function () { sh.close(); onProceed(); });
        body.appendChild(go);
        var cancel = document.createElement('button');
        cancel.className = 'gsheetbtn ghost'; cancel.textContent = 'Cancel';
        cancel.addEventListener('click', function () { sh.close(); });
        body.appendChild(cancel);
      }
    });
  }

  document.getElementById('continue').addEventListener('click', function () {
    var pro = CarBox.get('isPro');
    var locked = CarBox.get('goalLocked');
    var current = CarBox.get('goal');
    /* Pro: change freely. */
    if (pro) { CarBox.set('goal', selected); location.href = 'upgrades.html'; return; }
    /* Free + already used the one-time choice: cannot switch without Pro. */
    if (locked) {
      if (selected === current) { location.href = 'upgrades.html'; return; }
      UI.toast('Changing your goal needs CarBox Pro');
      Pro.open();
      return;
    }
    /* Free + first choice: explain it is one-time, then lock it in. */
    confirmGoalOnce(selected, function () {
      CarBox.set('goal', selected);
      CarBox.set('goalLocked', true);
      location.href = 'upgrades.html';
    });
  });

  if (location.hash === '#pro') Pro.open();
});
</script>
</body>
</html>
