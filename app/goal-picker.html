<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBox — Pick a goal</title>
<style>html{background:#E9E9E9}</style>
<script>(function(){var t='system';try{t=(JSON.parse(localStorage.getItem('carbox.v1'))||{}).theme||'system'}catch(e){}if(t==='system')t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t)})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script defer src="state.js"></script>
<script defer src="ui.js"></script>
<link rel="prefetch" href="upgrades.html">
<style>

  .phone{padding-bottom:190px}
  .goalhead{text-align:center;margin-top:26px}
  .goalhead h1{font-size:36px;color:var(--tx,#141210);line-height:1}
  .goalhead .sub{font-size:15px;font-weight:500;color:var(--warmgray);margin-top:5px}

  .goalgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}
  .goalcard{
    position:relative;
    background:var(--card);border-radius:26px;box-shadow:var(--shadow);
    border:none;cursor:pointer;padding:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    aspect-ratio:1/1.02;
    box-shadow:var(--shadow),inset 0 0 0 0 rgba(110,90,70,0);
    transition:box-shadow .28s cubic-bezier(.3,1.4,.4,1),transform 90ms ease-out;
  }
  .goalcard.sel{box-shadow:var(--shadow),inset 0 0 0 3.5px #6E5A46}
  .goalcard .glabel{
    font-family:'League Spartan',sans-serif;font-size:16.5px;font-weight:600;color:var(--tx,#141210);
  }
  .g-cash{width:64px}.g-tire{width:70px}.g-star{width:66px}.g-watch{width:64px}
  .goalcard .lock{
    position:absolute;top:11px;right:12px;width:15px;
  }

  .goalfoot{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:375px;z-index:20;
    background:var(--bg-bottom);
    box-shadow:0 -8px 22px rgba(0,0,0,.05);
    padding:14px 18px 20px;
  }
  .prorow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .prorow .protx{font-size:15px;font-weight:500;color:var(--mut,#8D8D8B);line-height:1.3}
  .prorow .probadge{background:none;border:none;cursor:pointer;padding:0;flex:none}
  .prorow .probadge img{width:51px}
  .continue{
    width:100%;margin-top:13px;
    background:var(--brown-warm);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:14px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:19px;
    box-shadow:var(--shadow);
  }
</style>
</head>
<body>
<div class="phone">

  <div class="goalhead">
    <h1 class="serif">Pick a goal</h1>
    <div class="sub">for your Bugatti Chiron</div>
  </div>

  <div class="goalgrid">
    <button class="goalcard" data-goal="More power">
      <img class="g-cash" src="assets/goal_cash.png" alt="">
      <span class="glabel">More power</span>
    </button>
    <button class="goalcard locked" data-goal="Better handling" aria-label="Better handling — CarBox Pro">
      <img class="g-tire" src="assets/goal_tire.png" alt="">
      <span class="glabel">Better handling</span>
      <img class="lock" src="assets/badge_lock.png" alt="">
    </button>
    <button class="goalcard locked" data-goal="Show car looks" aria-label="Show car looks — CarBox Pro">
      <img class="g-star" src="assets/goal_star.png" alt="">
      <span class="glabel">Show car looks</span>
      <img class="lock" src="assets/badge_lock.png" alt="">
    </button>
    <button class="goalcard locked" data-goal="Track ready" aria-label="Track ready — CarBox Pro">
      <img class="g-watch" src="assets/goal_watch.png" alt="">
      <span class="glabel">Track ready</span>
      <img class="lock" src="assets/badge_lock.png" alt="">
    </button>
  </div>

  <div class="goalfoot">
    <div class="prorow">
      <div class="protx">Free plan includes 1 goal.<br>unlock all with Pro</div>
      <button class="probadge" aria-label="CarBox Pro"><img src="assets/badge_pro.png" alt=""></button>
    </div>
    <button class="continue" id="continue">Continue</button>
  </div>

</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelector('.goalhead .sub').textContent = 'for your ' + CarBox.get('vehicle').name;
  var selected = CarBox.get('goal');
  var cards = document.querySelectorAll('.goalcard');

  function refresh() {
    cards.forEach(function (card) {
      card.classList.toggle('sel', card.getAttribute('data-goal') === selected);
    });
  }
  refresh();

  cards.forEach(function (card) {
    card.addEventListener('click', function () {
      if (card.classList.contains('locked')) {
        UI.wiggle(card);
        UI.toast('Included in CarBox Pro — coming soon');
        return;
      }
      selected = card.getAttribute('data-goal');
      refresh();
    });
  });

  document.querySelector('.probadge').addEventListener('click', function () {
    UI.toast('Included in CarBox Pro — coming soon');
  });

  document.getElementById('continue').addEventListener('click', function () {
    CarBox.set('goal', selected);
    location.href = 'upgrades.html';
  });
});
</script>
</body>
</html>
