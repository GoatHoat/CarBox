<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBox — Pick a goal</title>
<style>html{background:#E9E9E9}</style>
<script>(function(){var t='system';try{t=(JSON.parse(localStorage.getItem('carbox.v1'))||{}).theme||'system'}catch(e){}if(t==='system')t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);try{var d=sessionStorage.getItem('carbox.navdir');if(d){document.documentElement.setAttribute('data-navdir',d);sessionStorage.removeItem('carbox.navdir')}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script defer src="state.js"></script>
<script defer src="ui.js"></script>
<script defer src="pro.js"></script>
<link rel="prefetch" href="upgrades.html">
<style>

  .phone{padding-bottom:190px}
  .goalhead{text-align:center;margin-top:26px}
  .goalhead h1{font-size:36px;color:var(--tx,#141210);line-height:1}
  .goalhead .sub{font-size:15px;font-weight:500;color:var(--warmgray);margin-top:5px}

  .goalgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}
  .goalcard{
    position:relative;
    background:var(--card);border-radius:26px;box-shadow:var(--shadow);
    border:none;cursor:pointer;padding:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    aspect-ratio:1/1.02;
    box-shadow:var(--shadow),inset 0 0 0 0 rgba(110,90,70,0);
    transition:box-shadow .28s cubic-bezier(.3,1.4,.4,1),transform 90ms ease-out;
  }
  .goalcard.sel{box-shadow:var(--shadow),inset 0 0 0 3.5px #6E5A46}
  .goalcard .glabel{
    font-family:'League Spartan',sans-serif;font-size:16.5px;font-weight:600;color:var(--tx,#141210);
  }
  .g-cash{width:64px}.g-tire{width:70px}.g-star{width:66px}.g-watch{width:64px}
  .goalcard .lock{
    position:absolute;top:11px;right:12px;width:15px;
  }

  .goalfoot{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:375px;z-index:20;
    background:var(--bg-bottom);
    box-shadow:0 -8px 22px rgba(0,0,0,.05);
    padding:14px 18px calc(20px + env(safe-area-inset-bottom, 0px));
  }
  .prorow{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .prorow .protx{font-size:15px;font-weight:500;color:var(--mut,#8D8D8B);line-height:1.3}
  .prorow .probadge{background:none;border:none;cursor:pointer;padding:0;flex:none}
  .prorow .probadge img{width:51px}
  .continue{
    width:100%;margin-top:13px;
    background:var(--brown-warm);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:14px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:19px;
    box-shadow:var(--shadow);
  }
  /* one-time-goal confirm popup buttons */
  .gsheetbtn{
    width:100%;margin-top:12px;
    background:var(--brown-warm);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:12px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:16px;box-shadow:var(--shadow);
  }
  .gsheetbtn.ghost{background:transparent;color:var(--tx,#141210);box-shadow:none;margin-top:4px}
  .gsheetbtn:disabled{background:var(--ctl,#D9D4D0);color:var(--mut,#9B918F);box-shadow:none;cursor:default}
  /* budget step chips */
  .bchips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .bchip{
    background:var(--ctl,#D9D4D0);border:none;border-radius:999px;cursor:pointer;padding:9px 15px;
    font-family:'League Spartan',sans-serif;font-size:14px;font-weight:700;color:var(--tx2,#3E3A36);
  }
  .bchip.sel{background:var(--brown-warm);color:#FBF8F4}
  .bcustom{
    margin-top:10px;background:var(--surface,#F5F3F4);border-radius:16px;box-shadow:var(--shadow);
    padding:8px 14px 9px;display:none;
  }
  .bcustom.show{display:block}
  .bcustom .elab{font-size:12px;font-weight:600;color:var(--mut,#9B918F)}
  .bcustom input{
    width:100%;border:none;background:transparent;outline:none;
    font-family:'League Spartan',sans-serif;font-size:17px;font-weight:600;color:var(--tx,#141210);margin-top:2px;padding:0;
  }
</style>
</head>
<body>
<div class="phone">

  <div class="goalhead">
    <h1 class="serif">Pick a goal</h1>
    <div class="sub">for your Bugatti Chiron</div>
  </div>

  <div class="goalgrid">
    <button class="goalcard" data-goal="More power">
      <img class="g-cash" src="assets/goal_cash.png" alt="">
      <span class="glabel">More power</span>
    </button>
    <button class="goalcard" data-goal="Better handling">
      <img class="g-tire" src="assets/goal_tire.png" alt="">
      <span class="glabel">Better handling</span>
    </button>
    <button class="goalcard" data-goal="Show car looks">
      <img class="g-star" src="assets/goal_star.png" alt="">
      <span class="glabel">Show car looks</span>
    </button>
    <button class="goalcard" data-goal="Track ready">
      <img class="g-watch" src="assets/goal_watch.png" alt="">
      <span class="glabel">Track ready</span>
    </button>
  </div>

  <div class="goalfoot">
    <div class="prorow">
      <div class="protx">Pick one goal for free.<br>Change it anytime with Pro</div>
      <button class="probadge" aria-label="CarBox Pro"><img src="assets/badge_pro.png" alt=""></button>
    </div>
    <button class="continue" id="continue">Continue</button>
  </div>

</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelector('.goalhead .sub').textContent = 'for your ' + CarBox.get('vehicle').name;
  var selected = CarBox.get('goal');
  var cards = document.querySelectorAll('.goalcard');

  function refresh() {
    cards.forEach(function (card) {
      card.classList.toggle('sel', card.getAttribute('data-goal') === selected);
    });
  }
  refresh();

  /* every goal is selectable now; the free plan just limits you to ONE choice. */
  cards.forEach(function (card) {
    card.addEventListener('click', function () {
      selected = card.getAttribute('data-goal');
      refresh();
    });
  });

  function proText() {
    if (CarBox.get('isPro')) document.querySelector('.protx').innerHTML = 'CarBox Pro: change your goal anytime.';
  }
  proText();
  document.addEventListener('carbox-pro', proText);

  document.querySelector('.probadge').addEventListener('click', function () {
    if (CarBox.get('isPro')) UI.toast('You’re on CarBox Pro');
    else Pro.open();
  });

  /* budget ranges for the budget step (labels use the active currency) */
  var RANGES = [{ min: 0, max: 500 }, { min: 500, max: 2000 }, { min: 2000, max: 5000 }, { min: 5000, max: null }];
  function rangeLabel(b) {
    if (!b) return '';
    if (b.max == null) return CarBox.fmtMoney(b.min) + '+';
    if (b.min > 0) return CarBox.fmtMoney(b.min) + '–' + CarBox.fmtMoney(b.max);
    return 'Under ' + CarBox.fmtMoney(b.max);
  }
  function sameBudget(a, b) { return !!(a && b && a.min === b.min && a.max === b.max); }

  /* budget step: quick-pick ranges + a custom cap. isOneTime => free one-time note. */
  function openBudget(isOneTime, onConfirm) {
    var draft = CarBox.get('budget');
    var sh = UI.sheet({
      title: 'Set your budget',
      label: 'Set your budget',
      build: function (body) {
        var note = document.createElement('div');
        note.className = 'sheet-note'; note.style.marginTop = '0';
        note.textContent = isOneTime
          ? 'We’ll only recommend mods within this. This goal and budget are your one free pick, and changing them later needs CarBox Pro.'
          : 'We’ll keep recommendations for ' + selected + ' within this budget.';
        body.appendChild(note);

        var chips = document.createElement('div'); chips.className = 'bchips';
        var customWrap = document.createElement('div'); customWrap.className = 'bcustom';
        var clab = document.createElement('div'); clab.className = 'elab'; clab.textContent = 'Custom max (' + CarBox.get('currency') + ')';
        var customInp = document.createElement('input'); customInp.type = 'number'; customInp.inputMode = 'numeric'; customInp.placeholder = 'e.g. 1500';
        customWrap.appendChild(clab); customWrap.appendChild(customInp);

        var go = document.createElement('button'); go.className = 'gsheetbtn'; go.textContent = 'Continue'; go.disabled = true;
        function setDraft(b) { draft = b; go.disabled = !b; }
        function selectChip(el) { chips.querySelectorAll('.bchip').forEach(function (c) { c.classList.remove('sel'); }); if (el) el.classList.add('sel'); }

        RANGES.forEach(function (b) {
          var c = document.createElement('button'); c.type = 'button'; c.className = 'bchip'; c.textContent = rangeLabel(b);
          c.addEventListener('click', function () { selectChip(c); customWrap.classList.remove('show'); setDraft(b); });
          chips.appendChild(c);
          if (sameBudget(draft, b)) { selectChip(c); setDraft(b); }
        });
        var cc = document.createElement('button'); cc.type = 'button'; cc.className = 'bchip'; cc.textContent = 'Custom';
        cc.addEventListener('click', function () {
          selectChip(cc); customWrap.classList.add('show'); customInp.focus();
          var n = parseInt(customInp.value, 10); setDraft(n > 0 ? { min: 0, max: n } : null);
        });
        chips.appendChild(cc);
        customInp.addEventListener('input', function () { var n = parseInt(this.value, 10); setDraft(n > 0 ? { min: 0, max: n } : null); });
        /* existing custom budget (not one of the ranges) -> preselect Custom */
        if (draft && !RANGES.some(function (b) { return sameBudget(draft, b); })) {
          selectChip(cc); customWrap.classList.add('show'); customInp.value = draft.max || ''; setDraft(draft);
        }

        body.appendChild(chips); body.appendChild(customWrap);
        go.addEventListener('click', function () { if (!draft) return; sh.close(); onConfirm(draft); });
        body.appendChild(go);
      }
    });
  }

  document.getElementById('continue').addEventListener('click', function () {
    var pro = CarBox.get('isPro');
    var locked = CarBox.get('goalLocked');
    var current = CarBox.get('goal');
    /* Free + already used the one-time choice: can't change goal/budget without Pro. */
    if (!pro && locked) {
      if (selected !== current) { UI.toast('Changing your goal needs CarBox Pro'); Pro.open(); return; }
      location.href = 'upgrades.html'; return;
    }
    /* Pro (free changes) OR free first-time: pick the budget, then commit. */
    openBudget(!pro && !locked, function (budget) {
      CarBox.set('goal', selected);
      CarBox.set('budget', budget);
      if (!pro && !locked) CarBox.set('goalLocked', true);
      location.href = 'upgrades.html';
    });
  });

  if (location.hash === '#pro') Pro.open();
});
</script>
</body>
</html>
