<script>(function(){try{var _st=(JSON.parse(localStorage.getItem('carbox.v1'))||{});var _sess=false;try{for(var _i=0;_i<localStorage.length;_i++){if(/^sb-.*-auth-token$/.test(localStorage.key(_i))){_sess=true;break}}}catch(e){}if(!_st.onboardingComplete&&!_sess){location.replace('onboarding.html');return}}catch(e){location.replace('onboarding.html');return}var t='system';try{t=(JSON.parse(localStorage.getItem('carbox.v1'))||{}).theme||'system'}catch(e){}if(t==='system')t=window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);try{var d=sessionStorage.getItem('carbox.navdir');if(d){document.documentElement.setAttribute('data-navdir',d);sessionStorage.removeItem('carbox.navdir')}}catch(e){}})();</script>

<style>
  /* spec list header + small Edit pill (top of the 6-spec list) */
  .spec-head{display:flex;align-items:center;justify-content:space-between;margin:0 2px 7px}
  .spec-head-lbl{
    font-size:11.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
    color:var(--mut,#8D8D8B);
  }
  .spec-edit{
    background:var(--brown-warm);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:5px 13px;font-family:'League Spartan',sans-serif;font-size:12px;font-weight:700;
    min-height:28px;box-shadow:var(--shadow);
  }
  /* edit sheet fields — local to this page's specs editor */
  .cbfield{
    background:var(--surface,#F5F3F4);border-radius:16px;box-shadow:var(--shadow);
    padding:8px 14px 9px;margin-top:9px;
  }
  .cbfield .cblab{font-size:12px;font-weight:600;color:var(--mut,#9B918F)}
  .cbfield input{
    width:100%;border:none;background:transparent;outline:none;
    font-family:'League Spartan',sans-serif;font-size:16px;font-weight:600;color:var(--tx,#141210);
    margin-top:2px;padding:0;
  }
  .cbfield input::placeholder{color:var(--mut,#AEA6A3);opacity:1;font-weight:500}
  .cbsheetbtn{
    width:100%;margin-top:14px;
    background:var(--brown-warm);color:#FBF8F4;border:none;border-radius:999px;cursor:pointer;
    padding:12px 0;font-family:'League Spartan',sans-serif;font-weight:600;font-size:16px;
    box-shadow:var(--shadow);
  }
  .cbsheetbtn:disabled{background:var(--ctl,#D9D4D0);color:var(--mut,#9B918F);box-shadow:none;cursor:default}

  /* multi-car switcher — appended into the top-right .iconstack (Pro only) */
  .carbtn{
    position:relative;width:45px;height:45px;border-radius:50%;
    background:var(--pill);box-shadow:var(--shadow);border:2px solid transparent;
    cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center;overflow:hidden;
    transition:border-color .25s ease-out,transform .25s cubic-bezier(.3,1.4,.4,1);
  }
  .carbtn img{width:40px;height:auto;pointer-events:none}
  .carbtn.active{border-color:#6E5A46}
  .carbtn.locked{opacity:.45}
  .carbtn.locked::after{
    content:"";position:absolute;inset:0;background:url("assets/badge_lock.png") center/16px no-repeat;
    opacity:.9;
  }
  @keyframes carbtnin{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:none}}
  .carbtn.justadded{animation:carbtnin .4s cubic-bezier(.3,1.4,.4,1)}
  .addcarbtn{
    width:45px;height:45px;border-radius:50%;
    background:var(--pill);box-shadow:var(--shadow);border:2px dashed var(--mut,#C2B6AA);
    cursor:pointer;font-size:24px;line-height:1;color:var(--mut,#8D8579);
    display:flex;align-items:center;justify-content:center;padding:0;
  }
  @media (prefers-reduced-motion: reduce){ .carbtn.justadded{animation:none} }

  /* back arrow (top-left) on the car detail view */
  .detailback{
    position:absolute;top:0;left:0;z-index:25;background:none;border:none;cursor:pointer;
    padding:6px 10px 6px 0;display:flex;align-items:center;min-height:44px;
  }
  .detailback img{width:30px}
  /* cards home */
  .garage-lbl{font-family:'DM Serif Display',serif;font-size:26px;color:var(--tx,#141210);margin:4px 2px 12px}
  .carcards{display:flex;flex-direction:column;gap:12px}
  .carcard{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--card);border-radius:20px;box-shadow:var(--shadow);border:2px solid transparent;
    padding:10px 15px;cursor:pointer;min-height:94px;
    transition:transform 90ms ease-out;
  }
  .carcard.active{border-color:#6E5A46}
  .carcard .cc-sprite{width:116px;flex:none;pointer-events:none}
  .carcard .cc-info{min-width:0;flex:1}
  .carcard .cc-name{font-family:'League Spartan',sans-serif;font-size:18px;font-weight:700;color:var(--tx,#141311);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .carcard .cc-sub{font-size:13.5px;font-weight:500;color:var(--mut,#9A928B);margin-top:3px}
  .carcard.locked{opacity:.5}
  .carcard.locked .cc-sub{color:#B3402F}
  .addcard{
    display:flex;align-items:center;justify-content:center;gap:10px;width:100%;min-height:94px;
    background:transparent;border:2px dashed var(--mut,#C2B6AA);border-radius:20px;cursor:pointer;
    color:var(--mut,#8D8579);font-family:'League Spartan',sans-serif;font-weight:700;font-size:16px;
  }
  .addcard .cc-plus{font-size:30px;line-height:1}
  /* press-and-hold a car card to reveal a delete X (Pro, 2+ cars) */
  .ccdel{
    position:absolute;top:-8px;right:-8px;width:26px;height:26px;border-radius:50%;
    border:2px solid var(--card);background:#B3402F;color:#fff;font-size:15px;line-height:21px;
    padding:0;cursor:pointer;display:none;z-index:5;
  }
  .carcards.delmode .carcard .ccdel{display:block}
  @keyframes ccjiggle{0%,100%{transform:rotate(-.8deg)}50%{transform:rotate(.8deg)}}
  .carcards.delmode .carcard{animation:ccjiggle .32s ease-in-out infinite}
  @media (prefers-reduced-motion: reduce){ .carcards.delmode .carcard{animation:none} }
  @keyframes cardin{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
  .carcard.justadded{animation:cardin .4s cubic-bezier(.3,1.4,.4,1)}
  @keyframes viewInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
  @keyframes viewInLeft{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:none}}
  #detailView.slidein{animation:viewInRight .28s cubic-bezier(.3,1.4,.4,1)}
  #cardsView.slidein{animation:viewInLeft .28s cubic-bezier(.3,1.4,.4,1)}
  @media (prefers-reduced-motion: reduce){ .carcard.justadded,#detailView.slidein,#cardsView.slidein{animation:none} }
</style>

<body>
<div class="phone">

  <div class="toprow">
    <button class="detailback" id="detailBack" aria-label="Back to garage" hidden><img src="assets/icon_back.png" alt=""></button>
    <div class="notif" id="notifpill" role="button" tabindex="0" data-press>
      <span id="notiftext">Oil change due in 400 mi</span>
      <img src="assets/icon_warning.png" alt="">
    </div>
    <div class="iconstack">
      <button class="roundbtn" id="bellbtn" aria-label="Notifications">
        <img class="i-bell" src="assets/icon_bell.png" alt="">
        <span class="badge" id="badge">1</span>
      </button>
      <button class="roundbtn" id="gearbtn" aria-label="Settings"><img class="i-settings" src="assets/icon_settings.png" alt=""></button>
    </div>
  </div>

  <div class="profile">
    <div class="avatar"></div>
    <div>
      <div class="pname">Vojtech13</div>
      <div class="phandle">@Vojtech.Arkes</div>
    </div>
  </div>

  <!-- CARDS VIEW: one horizontal card per car + an add-car card -->
  <div id="cardsView" hidden>
    <div class="garage-lbl">Your garage</div>
    <div id="carCards" class="carcards"></div>
  </div>

  <!-- DETAIL VIEW: the single-car garage (what it looked like before) -->
  <div id="detailView">
  <div class="hero"><img class="i-sprite" src="assets/sprite_chiron.png" alt="Bugatti Chiron pixel art"></div>
  <h1 class="cartitle serif">Bugatti Chiron</h1>
  <div class="caryear serif">2026</div>

  <div class="spec-head">
    <span class="spec-head-lbl">Specs</span>
    <button class="spec-edit" id="specEdit" aria-label="Edit specs">Edit</button>
  </div>
  <div class="spec">
    <div class="row"><div class="ic"><img class="i-piston" src="assets/spec_piston.png" alt=""></div><div class="tx" id="spec-engine"></div></div>
    <div class="row"><div class="ic"><img class="i-bolt" src="assets/spec_bolt.png" alt=""></div><div class="tx" id="spec-horsepower"></div></div>
    <div class="row"><div class="ic"><img class="i-gearbox" src="assets/spec_gearbox.png" alt=""></div><div class="tx" id="spec-torque"></div></div>
    <div class="row"><div class="ic"><img class="i-gear" src="assets/spec_gear.png" alt=""></div><div class="tx" id="spec-transmission"></div></div>
    <div class="row"><div class="ic"><img class="i-tire" src="assets/spec_tire.png" alt=""></div><div class="tx" id="spec-drivetrain"></div></div>
    <div class="row"><div class="ic"><img class="i-gauge" src="assets/spec_gauge.png" alt=""></div><div class="tx" id="spec-accel"></div></div>
  </div>

  <div class="actions">
    <button class="actbtn" id="likebtn" aria-label="Like"><img class="i-thumb" src="assets/icon_thumb.png" alt=""></button>
    <button class="actbtn" id="commentbtn" aria-label="Comments"><img class="i-comment" src="assets/icon_comment.png" alt=""></button>
    <button class="actbtn" id="sharebtn" aria-label="Share"><img class="i-share" src="assets/icon_share.png" alt=""></button>
  </div>
  </div>

  <nav class="nav" data-active="0">
    <span class="navpill" aria-hidden="true"></span>
    <a class="tab active" href="index.html"><img class="i-navtire" src="assets/nav_tire_v2.png" alt=""><span class="lbl">Garage</span></a>
    <a class="tab" href="log.html"><img class="i-navwrench" src="assets/nav_wrench.png" alt=""><span class="lbl">log</span></a>
    <a class="tab" href="upgrades.html"><img class="i-navgear" src="assets/nav_up.png" alt=""><span class="lbl">upgrades</span></a>
  </nav>

</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  /* ── hydrate from state (re-runs when a prerendered/bfcached copy shows) ── */
  var badge = document.getElementById('badge');
  function unread() {
    return CarBox.get('notifications').filter(function (n) { return n.unread; }).length;
  }
  function paintBadge() {
    var n = unread();
    badge.textContent = String(n);
    badge.classList.toggle('gone', n === 0);
    /* bell swings gently while something is unread */
    document.querySelector('.i-bell').classList.toggle('bell-live', n > 0 && !UI.reduced());
  }
  /* the six spec rows, in display order, keyed to vehicle.specs fields */
  var SPEC_ROWS = [
    { key: 'engine', label: 'Engine' },
    { key: 'horsepower', label: 'Horsepower' },
    { key: 'torque', label: 'Torque' },
    { key: 'transmission', label: 'Transmission' },
    { key: 'drivetrain', label: 'Drivetrain' },
    { key: 'accel', label: '0-60 mph' }
  ];
  function paintSpecs(vehicle) {
    var s = vehicle.specs || {};
    SPEC_ROWS.forEach(function (r) {
      var el = document.getElementById('spec-' + r.key);
      if (el) el.textContent = (s[r.key] && String(s[r.key]).trim()) || '—';
    });
  }
  /* computed advised-service line for the ACTIVE car (Part C). Returns null when
     there's no meaningful reminder or the Settings "Service reminders" toggle is off. */
  function serviceLine() { return CarBox.serviceReminderText(); }
  /* ── two-level Garage: a cards HOME (all your cars + an add card) and the
     single-car DETAIL view. Free / single-car users go straight to detail;
     Pro (or a lapsed user with extra cars) get the cards home. ── */
  var cardsView = document.getElementById('cardsView');
  var detailView = document.getElementById('detailView');
  var detailBack = document.getElementById('detailBack');
  var carCards = document.getElementById('carCards');
  var pillEl = document.getElementById('notifpill');
  var currentView = null;
  var delMode = false;

  function useCards() { return CarBox.get('isPro') || CarBox.cars().length > 1; }
  function exitDelMode() { if (delMode) { delMode = false; carCards.classList.remove('delmode'); } }
  function confirmDeleteCar(c) {
    var nm = (c.vehicle && c.vehicle.name) || 'this car';
    var PRIMARY = 'width:100%;margin-top:12px;background:#B3402F;color:#fff;border:none;border-radius:999px;cursor:pointer;' +
      'padding:12px 0;font-family:\'League Spartan\',sans-serif;font-weight:600;font-size:16px;box-shadow:var(--shadow)';
    var GHOST = 'width:100%;margin-top:6px;background:transparent;color:var(--tx,#141210);border:none;cursor:pointer;' +
      'padding:11px 0;font-family:\'League Spartan\',sans-serif;font-weight:600;font-size:15px';
    var sh = UI.sheet({
      title: 'Delete ' + nm + '?', label: 'Delete car',
      build: function (body) {
        var note = document.createElement('div');
        note.className = 'sheet-note'; note.style.marginTop = '0';
        note.textContent = 'This permanently removes ' + nm + ' and its entire log and photos from your garage. This cannot be undone.';
        body.appendChild(note);
        var del = document.createElement('button'); del.textContent = 'Delete ' + nm; del.style.cssText = PRIMARY;
        del.addEventListener('click', function () {
          CarBox.removeCar(c.id);
          sh.close(); exitDelMode();
          if (useCards()) { showCards(false); } else { showDetail(false, false); }
        });
        body.appendChild(del);
        var cancel = document.createElement('button'); cancel.textContent = 'Cancel'; cancel.style.cssText = GHOST;
        cancel.addEventListener('click', function () { sh.close(); });
        body.appendChild(cancel);
      }
    });
  }

  function hydrateShared() {
    var prof = CarBox.get('profile');
    document.querySelector('.pname').textContent = prof.name;
    document.querySelector('.phandle').textContent = prof.handle;
    paintBadge();
  }
  function hydrateDetail() {
    var vehicle = CarBox.get('vehicle');
    document.querySelector('.cartitle').textContent = vehicle.name;
    document.querySelector('.caryear').textContent = String(vehicle.year);
    paintSpecs(vehicle);
    UI.carSprite(document.querySelector('.i-sprite'));
    var line = serviceLine();
    if (line) { document.getElementById('notiftext').textContent = line; pillEl.style.display = ''; }
    else { pillEl.style.display = 'none'; }
  }
  function tintInto(img, ap) {
    ap = ap || { presetId: 'body_suv', hue: null, shade: 1 };
    UI.tintSprite('assets/' + ap.presetId + '.png', ap.hue, ap.shade, function (url) { img.src = url; });
  }
  function renderCards(justAddedId) {
    carCards.innerHTML = '';
    var pro = CarBox.get('isPro');
    var list = CarBox.cars();
    var activeId = CarBox.activeCarId();
    list.forEach(function (c, i) {
      var locked = !pro && i > 0;   /* lapsed: only the first car is usable */
      var v = c.vehicle || {};
      var card = document.createElement('button');
      card.className = 'carcard' + (c.id === activeId ? ' active' : '') + (locked ? ' locked' : '') +
        (c.id === justAddedId ? ' justadded' : '');
      card.setAttribute('data-press', '');
      var img = document.createElement('img'); img.className = 'cc-sprite'; img.alt = '';
      tintInto(img, c.appearance);
      var info = document.createElement('div'); info.className = 'cc-info';
      var nm = document.createElement('div'); nm.className = 'cc-name'; nm.textContent = v.name || 'Car';
      var sub = document.createElement('div'); sub.className = 'cc-sub';
      sub.textContent = locked ? 'Resubscribe to access' : (String(v.year || '') + ' · ' + CarBox.fmtMiles(v.mileage || 0));
      info.appendChild(nm); info.appendChild(sub);
      card.appendChild(img); card.appendChild(info);
      /* delete X (revealed by press-and-hold; only meaningful with 2+ cars) */
      var del = document.createElement('button');
      del.className = 'ccdel'; del.textContent = '×'; del.setAttribute('aria-label', 'Delete ' + (v.name || 'car'));
      del.addEventListener('click', function (e) { e.stopPropagation(); confirmDeleteCar(c); });
      card.appendChild(del);
      card.addEventListener('click', function () {
        if (delMode) { exitDelMode(); return; }         /* in delete mode a tap just dismisses it */
        if (locked) { UI.toast('Resubscribe to CarBox Pro to use this car'); if (window.Pro) Pro.open(); return; }
        CarBox.setActiveCar(c.id);
        showDetail(true);
      });
      carCards.appendChild(card);
    });
    carCards.classList.toggle('delmode', delMode && list.length > 1);
    /* add-car card (same size); hidden only when a Pro user is already at 3 */
    if (!(pro && list.length >= CarBox.maxCars())) {
      var add = document.createElement('button');
      add.className = 'addcard'; add.setAttribute('aria-label', 'Add a car');
      add.innerHTML = '<span class="cc-plus">+</span> Add a car';
      add.addEventListener('click', onAddCar);
      carCards.appendChild(add);
    }
  }
  function showCards(animate, justAddedId) {
    currentView = 'cards';
    delMode = false;
    hydrateShared();
    renderCards(justAddedId);
    detailView.hidden = true; cardsView.hidden = false; detailBack.hidden = true;
    pillEl.style.display = 'none';
    if (animate && !UI.reduced()) { cardsView.classList.remove('slidein'); void cardsView.offsetWidth; cardsView.classList.add('slidein'); }
    window.scrollTo(0, 0);
  }
  function showDetail(fromCards, animate) {
    currentView = 'detail';
    delMode = false; carCards.classList.remove('delmode');
    hydrateShared(); hydrateDetail();
    cardsView.hidden = true; detailView.hidden = false; detailBack.hidden = !fromCards;
    if (animate !== false && !UI.reduced()) { detailView.classList.remove('slidein'); void detailView.offsetWidth; detailView.classList.add('slidein'); }
    window.scrollTo(0, 0);
  }
  function hydrate() {
    if (currentView === 'detail') { hydrateShared(); hydrateDetail(); if (useCards()) renderCards(); }
    else if (currentView === 'cards') { showCards(false); }
    else if (useCards()) showCards(false);      /* first load: Pro/multi-car -> cards home */
    else showDetail(false, false);              /* first load: free single car -> detail */
  }

  function onAddCar() {
    if (!CarBox.get('isPro')) { if (window.Pro) Pro.open(); return; }   /* free/lapsed -> paywall */
    if (CarBox.cars().length >= CarBox.maxCars()) { UI.toast('You’ve reached 3 cars'); return; }
    openAddCarSheet();
  }
  function openAddCarSheet() {
    var sh = UI.sheet({
      title: 'Add a car',
      label: 'Add a car',
      build: function (body) {
        var host = document.createElement('div');
        body.appendChild(host);
        var addBtn = document.createElement('button');
        addBtn.className = 'cbsheetbtn'; addBtn.textContent = 'Add car'; addBtn.disabled = true;
        var form = CarForm.mount(host, { onChange: function (valid) { addBtn.disabled = !valid; } });
        addBtn.addEventListener('click', function () {
          var v = form.value();
          if (!v.valid) return;
          var id = CarBox.addCar({
            vehicle: { name: v.make + ' ' + v.model, make: v.make, model: v.model, year: v.year, trim: v.trim, mileage: 0, specs: v.specs },
            appearance: { presetId: v.presetId, hue: v.hue, shade: v.shade },
            entries: [], planItems: [], goal: 'More power', goalLocked: false,
            stats: { baseInvested: 0, baseCount: 0 }, likes: 0, liked: false, comments: []
          });
          CarBox.setActiveCar(id);
          sh.close();
          showCards(true, id);                        /* back to the cards home, new card animated in */
        });
        body.appendChild(addBtn);
      }
    });
  }

  /* press-and-hold a car card to reveal delete X's; tap anywhere off to dismiss */
  (function () {
    var holdTimer = null;
    carCards.addEventListener('pointerdown', function (e) {
      if (CarBox.cars().length <= 1) return;                          /* can't delete your only car */
      if (e.target.closest('.ccdel') || e.target.closest('.addcard')) return;
      clearTimeout(holdTimer);
      holdTimer = setTimeout(function () { delMode = true; carCards.classList.add('delmode'); }, 450);
    });
    ['pointerup', 'pointercancel', 'pointermove', 'pointerleave'].forEach(function (ev) {
      carCards.addEventListener(ev, function () { clearTimeout(holdTimer); });
    });
    document.addEventListener('pointerdown', function (e) {
      if (delMode && (!e.target.closest || !e.target.closest('#carCards'))) exitDelMode();
    });
  })();

  /* back arrow + swipe-right return to the cards home */
  detailBack.addEventListener('click', function () { if (useCards()) showCards(true); });
  (function () {
    var sx = null, sy = null;
    detailView.addEventListener('pointerdown', function (e) { sx = e.clientX; sy = e.clientY; });
    detailView.addEventListener('pointerup', function (e) {
      if (sx === null) return;
      var dx = e.clientX - sx, dy = e.clientY - sy; sx = null;
      if (useCards() && !detailBack.hidden && dx > 70 && Math.abs(dy) < 50) showCards(true);
    });
  })();

  /* going Pro switches the home to the cards view */
  document.addEventListener('carbox-pro', function () { showCards(true); });

  hydrate();
  window.addEventListener('pageshow', function (e) { if (e.persisted) { CarBox.reload(); hydrate(); } });
  document.addEventListener('prerenderingchange', function () { CarBox.reload(); hydrate(); });

  /* ── like: springs the thumb, particles burst outward ── */
  var sparkPool = [];
  function burst(btn) {
    if (UI.reduced() || !btn.animate) return;
    var r = btn.getBoundingClientRect();
    var cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    for (var i = 0; i < 6; i++) {
      var s = sparkPool.pop() || document.createElement('span');
      s.className = 'spark';
      s.style.left = cx + 'px';
      s.style.top = cy + 'px';
      document.body.appendChild(s);
      var ang = (Math.PI * 2) * (i / 6) + Math.random() * 0.7;
      var dist = 26 + Math.random() * 16;
      (function (el) {
        var anim = el.animate([
          { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
          { transform: 'translate(calc(-50% + ' + (Math.cos(ang) * dist).toFixed(1) + 'px), calc(-50% + ' + (Math.sin(ang) * dist).toFixed(1) + 'px)) scale(.35)', opacity: 0 }
        ], { duration: 500, easing: 'cubic-bezier(.2,.7,.4,1)' });
        anim.onfinish = function () { el.remove(); sparkPool.push(el); };
      })(s);
    }
  }
  /* LIKES — local-until-backend (Part D/E). Read/write straight through the store
     each click so switching cars never uses a stale count. To go real, swap these
     CarBox.get/set('likes'|'liked') calls for backend reads/writes (needs DB +
     auth); the UI here does not change. */
  document.getElementById('likebtn').addEventListener('click', function () {
    var liked = !CarBox.get('liked');
    var count = CarBox.get('likes') + (liked ? 1 : -1);
    CarBox.set('liked', liked);
    CarBox.set('likes', count);
    var ic = this.querySelector('img');
    ic.classList.remove('pop');
    void ic.offsetWidth;
    ic.classList.add('pop');
    if (liked) burst(this);
  });

  /* ── share: copies a link to the REAL read-only public garage page for the
     active car (garage.html). Works on this device now; cross-device viewing
     needs the backend + hosting (Part E). ── */
  document.getElementById('sharebtn').addEventListener('click', function () {
    var dir = location.href.replace(/[?#].*$/, '').replace(/[^\/]*$/, '');
    var link = dir + 'garage.html?car=' + encodeURIComponent(CarBox.activeCarId());
    function done() { UI.toast('Garage link copied'); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(link).then(done, done);
    } else done();
  });

  /* ── comments: threaded, with a working composer ── */
  function replySub(reply) {
    var sub = document.createElement('div');
    sub.className = 'rowsub';
    var who = document.createElement('span');
    who.className = 'who';
    who.textContent = reply.user + '  ';
    sub.appendChild(who);
    sub.appendChild(document.createTextNode(reply.text));
    return sub;
  }
  /* ── basic content filter (UGC safety) ── */
  var BAD_WORDS = ['fuck', 'shit', 'bitch', 'cunt', 'nigger', 'faggot', 'asshole', 'retard'];
  function isClean(text) {
    var t = ' ' + text.toLowerCase().replace(/[^a-z\s]/g, ' ') + ' ';
    for (var i = 0; i < BAD_WORDS.length; i++) { if (t.indexOf(' ' + BAD_WORDS[i]) >= 0 || t.indexOf(BAD_WORDS[i]) >= 0) return false; }
    return true;
  }
  function modBtn(label, danger) {
    var b = document.createElement('button');
    b.textContent = label;
    b.style.cssText = 'background:none;border:none;cursor:pointer;padding:2px 0;margin-right:14px;' +
      'font-family:inherit;font-weight:600;font-size:12.5px;color:' + (danger ? '#B3402F' : 'var(--mut,#8D8579)');
    return b;
  }
  document.getElementById('commentbtn').addEventListener('click', function () {
    UI.sheet({
      title: 'Comments',
      label: 'Comments',
      build: function (body) {
        function render() {
          body.innerHTML = '';
          var me = CarBox.get('profile');
          var blocked = CarBox.get('blocked') || [];
          CarBox.get('comments').forEach(function (c) {
            if (blocked.indexOf(c.user) !== -1) return;   /* hide blocked users */
            var row = document.createElement('div');
            row.className = 'sheetrow';
            var top = document.createElement('div');
            top.className = 'rowtop';
            top.textContent = c.user;
            var tx = document.createElement('div');
            tx.className = 'rowtx';
            tx.textContent = c.text;
            row.appendChild(top); row.appendChild(tx);
            if (c.reply) row.appendChild(replySub(c.reply));
            /* moderation actions: delete your own; report/block others */
            var acts = document.createElement('div');
            acts.style.cssText = 'margin-top:7px';
            if (c.user === me.handle) {
              var del = modBtn('Delete', true);
              del.addEventListener('click', function () {
                var list = CarBox.get('comments').filter(function (x) { return x.id !== c.id; });
                CarBox.set('comments', list); render();
              });
              acts.appendChild(del);
            } else {
              var rep = modBtn('Report');
              rep.addEventListener('click', function () {
                var list = CarBox.get('comments').filter(function (x) { return x.id !== c.id; });
                CarBox.set('comments', list); render();
                UI.toast('Reported. Thanks, we’ll review this.');
              });
              var blk = modBtn('Block');
              blk.addEventListener('click', function () {
                var bl = CarBox.get('blocked') || [];
                if (bl.indexOf(c.user) === -1) bl.push(c.user);
                CarBox.set('blocked', bl); render();
                UI.toast('Blocked ' + c.user);
              });
              acts.appendChild(rep); acts.appendChild(blk);
            }
            row.appendChild(acts);
            body.appendChild(row);
          });
          var compose = document.createElement('div');
          compose.className = 'rowreply';
          var input = document.createElement('input');
          input.placeholder = 'Add a comment…';
          input.setAttribute('aria-label', 'Add a comment');
          var send = document.createElement('button');
          send.textContent = 'Send';
          send.addEventListener('click', function () {
            var text = input.value.trim();
            if (!text) return;
            if (!isClean(text)) { UI.toast('Please keep comments respectful.'); return; }
            var me2 = CarBox.get('profile');
            var comments = CarBox.get('comments');
            var id = 'c' + Date.now().toString(36);
            comments.push({ id: id, user: me2.handle, text: text, reply: null });
            CarBox.set('comments', comments);
            var notifs = CarBox.get('notifications');
            notifs.push({ id: 'n-' + id, type: 'comment', ref: id, user: me2.handle, text: text, unread: true });
            CarBox.set('notifications', notifs);
            paintBadge();
            input.value = '';
            render();
          });
          input.addEventListener('keydown', function (e) { if (e.key === 'Enter') send.click(); });
          compose.appendChild(input); compose.appendChild(send);
          body.appendChild(compose);
        }
        render();
      }
    });
  });

  /* ── notifications: comments land here, replies happen inline ── */
  document.getElementById('bellbtn').addEventListener('click', function () {
    UI.sheet({
      title: 'Notifications',
      label: 'Notifications',
      build: function (body) {
        function render() {
          body.innerHTML = '';
          /* computed service reminder for the active car sits at the top (Part C) */
          var svc = serviceLine();
          if (svc) {
            var srow = document.createElement('div');
            srow.className = 'sheetrow';
            srow.setAttribute('data-press', ''); srow.setAttribute('role', 'button');
            srow.setAttribute('tabindex', '0'); srow.style.cursor = 'pointer';
            var stx = document.createElement('div'); stx.className = 'rowtx';
            stx.textContent = svc + ' · ' + CarBox.get('vehicle').name;
            srow.appendChild(stx);
            srow.addEventListener('click', function () { location.href = 'log.html'; });
            body.appendChild(srow);
          }
          /* stored notifications = comments/replies only (service is computed above) */
          var list = CarBox.get('notifications').filter(function (n) { return n.type !== 'service'; });
          if (!svc && !list.length) {
            var empty = document.createElement('div');
            empty.className = 'sheet-note';
            empty.textContent = 'You’re all caught up.';
            body.appendChild(empty);
            return;
          }
          list.slice().reverse().forEach(function (n) {
            var row = document.createElement('div');
            row.className = 'sheetrow';
            var top = document.createElement('div');
            top.className = 'rowtop';
            top.textContent = n.user + (n.type === 'reply' ? ' replied' : ' commented');
            var tx2 = document.createElement('div');
            tx2.className = 'rowtx';
            tx2.textContent = n.text;
            row.appendChild(top); row.appendChild(tx2);
            if (n.type === 'comment' && n.ref) {
              var c = null;
              CarBox.get('comments').forEach(function (cc) { if (cc.id === n.ref) c = cc; });
              if (c && c.reply) {
                row.appendChild(replySub(c.reply));
              } else if (c) {
                var rr = document.createElement('div');
                rr.className = 'rowreply';
                var input = document.createElement('input');
                input.placeholder = 'Reply…';
                input.setAttribute('aria-label', 'Reply to ' + n.user);
                var send = document.createElement('button');
                send.textContent = 'Reply';
                send.addEventListener('click', function () {
                  var text = input.value.trim();
                  if (!text) return;
                  var me = CarBox.get('profile');
                  var comments = CarBox.get('comments');
                  comments.forEach(function (cc) {
                    if (cc.id === n.ref) cc.reply = { user: me.handle, text: text };
                  });
                  CarBox.set('comments', comments);
                  /* the commenter's side gets notified too */
                  var notifs = CarBox.get('notifications');
                  notifs.push({ id: 'nr' + Date.now().toString(36), type: 'reply', user: me.handle, text: text, unread: true });
                  CarBox.set('notifications', notifs);
                  render();
                  paintBadge();
                });
                input.addEventListener('keydown', function (e) { if (e.key === 'Enter') send.click(); });
                rr.appendChild(input); rr.appendChild(send);
                row.appendChild(rr);
              }
            }
            body.appendChild(row);
          });
        }
        render();
        /* opening the bell clears unread */
        var read = CarBox.get('notifications').map(function (n) { n.unread = false; return n; });
        CarBox.set('notifications', read);
        paintBadge();
      }
    });
  });

  /* ── shortcuts ── */
  var pill = document.getElementById('notifpill');
  pill.style.cursor = 'pointer';
  pill.addEventListener('click', function () { location.href = 'log.html'; });
  pill.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); location.href = 'log.html'; }
  });
  document.getElementById('gearbtn').addEventListener('click', function () {
    /* cache-bust: WKWebView otherwise serves settings.html from cache without
       hitting the dev server, so code changes never appear. Harmless in prod. */
    location.href = 'settings.html?v=' + Date.now();
  });

  /* ── edit specs: sheet with the six fields, prefilled, saves to vehicle ── */
  document.getElementById('specEdit').addEventListener('click', function () {
    var vehicle = CarBox.get('vehicle');
    var specs = vehicle.specs || {};
    UI.sheet({
      title: 'Edit specs',
      label: 'Edit specs',
      build: function (body) {
        var inputs = {};
        SPEC_ROWS.forEach(function (r) {
          var f = document.createElement('div'); f.className = 'cbfield';
          var l = document.createElement('div'); l.className = 'cblab'; l.textContent = r.label;
          var inp = document.createElement('input');
          inp.type = 'text';
          inp.value = specs[r.key] == null ? '' : specs[r.key];
          inp.setAttribute('aria-label', r.label);
          inp.placeholder = 'Add ' + r.label.toLowerCase();
          f.appendChild(l); f.appendChild(inp);
          body.appendChild(f);
          inputs[r.key] = inp;
        });
        var save = document.createElement('button');
        save.className = 'cbsheetbtn';
        save.textContent = 'Save';
        save.addEventListener('click', function () {
          var next = {};
          SPEC_ROWS.forEach(function (r) { next[r.key] = inputs[r.key].value.trim(); });
          vehicle.specs = next;
          CarBox.set('vehicle', vehicle);
          paintSpecs(vehicle);
          UI.toast('Specs updated');
        });
        body.appendChild(save);
      }
    });
  });

  /* subtle parallax on the hero sprite */
  if (!UI.reduced()) {
    var hero = document.querySelector('.i-sprite');
    var pTick = false;
    window.addEventListener('scroll', function () {
      if (pTick) return;
      pTick = true;
      requestAnimationFrame(function () {
        pTick = false;
        hero.style.transform = 'translateY(' + (window.scrollY * 0.15).toFixed(1) + 'px)';
      });
    }, { passive: true });
  }
});
</script>
</body>
</html>
