<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBox — Garage</title>
<style>html{background:#E9E9E9}</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=League+Spartan:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script defer src="state.js"></script>
<script defer src="ui.js"></script>
<script defer src="nav.js"></script>
<link rel="prefetch" href="log.html">
<link rel="prefetch" href="upgrades.html">
<script type="speculationrules">
{"prerender":[{"urls":["log.html","upgrades.html"]}]}
</script>
</head>
<body>
<div class="phone">

  <div class="toprow">
    <div class="notif" id="notifpill" role="button" tabindex="0" data-press>
      <span id="notiftext">Oil change due in 400 mi</span>
      <img src="assets/icon_warning.png" alt="">
    </div>
    <div class="iconstack">
      <button class="roundbtn" id="bellbtn" aria-label="Notifications">
        <img class="i-bell" src="assets/icon_bell.png" alt="">
        <span class="badge" id="badge">1</span>
      </button>
      <button class="roundbtn" id="gearbtn" aria-label="Settings"><img class="i-settings" src="assets/icon_settings.png" alt=""></button>
    </div>
  </div>

  <div class="profile">
    <div class="avatar"></div>
    <div>
      <div class="pname">Vojtech13</div>
      <div class="phandle">@Vojtech.Arkes</div>
    </div>
  </div>

  <div class="hero"><img class="i-sprite" src="assets/sprite_chiron.png" alt="Bugatti Chiron pixel art"></div>
  <h1 class="cartitle serif">Bugatti Chiron</h1>
  <div class="caryear serif">2026</div>

  <div class="spec">
    <div class="row"><div class="ic"><img class="i-piston" src="assets/spec_piston.png" alt=""></div><div class="tx">8.0L quad-turbo W16</div></div>
    <div class="row"><div class="ic"><img class="i-bolt" src="assets/spec_bolt.png" alt=""></div><div class="tx">1,479 hp (1,500 PS); Super Sport: 1,578 hp</div></div>
    <div class="row"><div class="ic"><img class="i-gearbox" src="assets/spec_gearbox.png" alt=""></div><div class="tx">7-speed Ricardo dual-clutch gearbox</div></div>
    <div class="row"><div class="ic"><img class="i-gear" src="assets/spec_gear.png" alt=""></div><div class="tx">Double wishbone suspension</div></div>
    <div class="row"><div class="ic"><img class="i-tire" src="assets/spec_tire.png" alt=""></div><div class="tx">Michelin Cup tires</div></div>
    <div class="row"><div class="ic"><img class="i-gauge" src="assets/spec_gauge.png" alt=""></div><div class="tx">0-100 km/h: ~2.4 s</div></div>
  </div>

  <div class="actions">
    <button class="actbtn" id="likebtn" aria-label="Like"><img class="i-thumb" src="assets/icon_thumb.png" alt=""><span class="likecount" id="likecount">412</span></button>
    <button class="actbtn" id="commentbtn" aria-label="Comments"><img class="i-comment" src="assets/icon_comment.png" alt=""></button>
  </div>

  <nav class="nav" data-active="0">
    <span class="navpill" aria-hidden="true"></span>
    <a class="tab active" href="index.html"><img class="i-navtire" src="assets/nav_tire_v2.png" alt=""><span class="lbl">Garage</span></a>
    <a class="tab" href="log.html"><img class="i-navwrench" src="assets/nav_wrench.png" alt=""><span class="lbl">log</span></a>
    <a class="tab" href="upgrades.html"><img class="i-navgear" src="assets/nav_gear.png" alt=""><span class="lbl">upgrades</span></a>
  </nav>

</div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  /* ── hydrate from state ── */
  var notifs = CarBox.get('notifications');
  var badge = document.getElementById('badge');
  function unread() {
    return CarBox.get('notifications').filter(function (n) { return n.unread; }).length;
  }
  function paintBadge() {
    var n = unread();
    badge.textContent = String(n);
    if (n === 0) badge.classList.add('gone');
  }
  if (notifs[0]) document.getElementById('notiftext').textContent = notifs[0].text;
  paintBadge();

  var likeState = { count: CarBox.get('likes'), liked: CarBox.get('liked') };
  var countEl = document.getElementById('likecount');
  countEl.textContent = likeState.count.toLocaleString('en-US');

  /* ── like: toggle with pop on the count ── */
  document.getElementById('likebtn').addEventListener('click', function () {
    likeState.liked = !likeState.liked;
    likeState.count += likeState.liked ? 1 : -1;
    CarBox.set('likes', likeState.count);
    CarBox.set('liked', likeState.liked);
    countEl.textContent = likeState.count.toLocaleString('en-US');
    countEl.classList.remove('pop');
    void countEl.offsetWidth;
    countEl.classList.add('pop');
  });

  /* ── comments sheet ── */
  document.getElementById('commentbtn').addEventListener('click', function () {
    UI.sheet({
      title: 'Comments',
      label: 'Comments',
      build: function (body) {
        CarBox.get('comments').forEach(function (c) {
          var row = document.createElement('div');
          row.className = 'sheetrow';
          var top = document.createElement('div');
          top.className = 'rowtop';
          top.textContent = c.user;
          var tx = document.createElement('div');
          tx.className = 'rowtx';
          tx.textContent = c.text;
          row.appendChild(top); row.appendChild(tx);
          body.appendChild(row);
        });
        var input = document.createElement('input');
        input.className = 'sheet-input';
        input.disabled = true;
        input.placeholder = 'Comments open at launch';
        input.setAttribute('aria-label', 'Comments open at launch');
        body.appendChild(input);
      }
    });
  });

  /* ── notifications sheet: opening clears the badge ── */
  document.getElementById('bellbtn').addEventListener('click', function () {
    UI.sheet({
      title: 'Notifications',
      label: 'Notifications',
      build: function (body) {
        var list = CarBox.get('notifications');
        if (!list.length) {
          var empty = document.createElement('div');
          empty.className = 'sheet-note';
          empty.textContent = 'You’re all caught up.';
          body.appendChild(empty);
        }
        list.forEach(function (n) {
          var row = document.createElement('div');
          row.className = 'sheetrow';
          row.setAttribute('data-press', '');
          row.setAttribute('role', 'button');
          row.setAttribute('tabindex', '0');
          var tx = document.createElement('div');
          tx.className = 'rowtx';
          tx.textContent = n.text;
          row.appendChild(tx);
          if (n.id === 'oil') {
            row.style.cursor = 'pointer';
            row.addEventListener('click', function () { location.href = 'log.html'; });
          }
          body.appendChild(row);
        });
        var read = CarBox.get('notifications').map(function (n) { n.unread = false; return n; });
        CarBox.set('notifications', read);
        badge.classList.add('gone');
      }
    });
  });

  /* ── shortcuts ── */
  var pill = document.getElementById('notifpill');
  pill.style.cursor = 'pointer';
  pill.addEventListener('click', function () { location.href = 'log.html'; });
  pill.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); location.href = 'log.html'; }
  });
  document.getElementById('gearbtn').addEventListener('click', function () {
    location.href = 'settings.html';
  });
});
</script>
</body>
</html>
