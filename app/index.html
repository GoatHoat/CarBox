<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CarBox — Garage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="phone">

  <div class="toprow">
    <div class="notif">
      <span>Oil change due in 400 mi</span>
      <img src="assets/icon_warning.png" alt="">
    </div>
    <div class="iconstack">
      <button class="roundbtn" aria-label="Notifications">
        <img class="i-bell" src="assets/icon_bell.png" alt="">
        <span class="badge">1</span>
      </button>
      <button class="roundbtn" aria-label="Settings"><img class="i-settings" src="assets/icon_settings.png" alt=""></button>
    </div>
  </div>

  <div class="profile">
    <div class="avatar"></div>
    <div>
      <div class="pname">Vojtech13</div>
      <div class="phandle">@Vojtech.Arkes</div>
    </div>
  </div>

  <div class="hero"><img class="i-sprite" src="assets/sprite_chiron.png" alt="Bugatti Chiron pixel art"></div>
  <h1 class="cartitle serif">Bugatti Chiron</h1>
  <div class="caryear serif">2026</div>

  <div class="spec">
    <div class="row"><div class="ic"><img class="i-piston" src="assets/spec_piston.png" alt=""></div><div class="tx">8.0L quad-turbo W16</div></div>
    <div class="row"><div class="ic"><img class="i-bolt" src="assets/spec_bolt.png" alt=""></div><div class="tx">1,479 hp (1,500 PS); Super Sport: 1,578 hp</div></div>
    <div class="row"><div class="ic"><img class="i-gearbox" src="assets/spec_gearbox.png" alt=""></div><div class="tx">7-speed Ricardo dual-clutch gearbox</div></div>
    <div class="row"><div class="ic"><img class="i-gear" src="assets/spec_gear.png" alt=""></div><div class="tx">Double wishbone suspension</div></div>
    <div class="row"><div class="ic"><img class="i-tire" src="assets/spec_tire.png" alt=""></div><div class="tx">Michelin Cup tires</div></div>
    <div class="row"><div class="ic"><img class="i-gauge" src="assets/spec_gauge.png" alt=""></div><div class="tx">0-100 km/h: ~2.4 s</div></div>
  </div>

  <div class="actions">
    <button class="actbtn" aria-label="Like"><img class="i-thumb" src="assets/icon_thumb.png" alt=""></button>
    <button class="actbtn" aria-label="Comments"><img class="i-comment" src="assets/icon_comment.png" alt=""></button>
  </div>

  <nav class="nav">
    <a class="tab active" href="index.html"><img class="i-navtire" src="assets/nav_tire_v2.png" alt=""><span class="lbl">Garage</span></a>
    <a class="tab" href="log.html"><img class="i-navwrench" src="assets/nav_wrench.png" alt=""><span class="lbl">log</span></a>
    <a class="tab" href="upgrades.html"><img class="i-navgear" src="assets/nav_gear.png" alt=""><span class="lbl">upgrades</span></a>
  </nav>

</div>
</body>
</html>
